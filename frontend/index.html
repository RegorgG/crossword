<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crossword Grid Editor</title>
    <link rel="stylesheet" href="grid-editor.css" />
</head>
<body>
    <div class="header">
        <h1>Crossword Grid Editor</h1>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="actions">
        <button class="primary" onclick="interpretCrossword()">Interpret as Crossword</button>
        <button onclick="resetGrid()">Reset Grid</button>
    </div>

    <div class="output-section" id="output-section" style="display: none;">
        <pre id="output-text"></pre>
        <button class="copy-btn" id="copy-btn" onclick="copyToClipboard()">Copy to clipboard</button>
    </div>

    <script src="grid-editor.js"></script>
</body>
</html>
